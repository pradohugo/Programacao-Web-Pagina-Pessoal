<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Pessoal — Escolha a versão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafaf9;
      color: #1c1917;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .icon { font-size: 2.5rem; color: #e07b39; margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    p  { font-size: 0.95rem; color: #78716c; margin-bottom: 2.5rem; }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    @media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.75rem 1.25rem;
      border: 2px solid #e7e5e4;
      border-radius: 1rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      background: #fff;
    }
    .card:hover {
      border-color: #e07b39;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(224,123,57,0.15);
    }
    .card i { font-size: 1.75rem; color: #e07b39; }
    .card strong { font-size: 1rem; font-weight: 600; }
    .card span { font-size: 0.8rem; color: #78716c; }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 9999px;
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(224,123,57,0.12);
      color: #c4612a;
      border: 1px solid rgba(224,123,57,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><i class="fa-solid fa-code"></i></div>
    <h1>Página Pessoal</h1>
    <p>Escolha qual versão do portfólio você quer visualizar:</p>
    <div class="cards">
      <a href="bootstrap/" class="card">
        <i class="fa-brands fa-bootstrap"></i>
        <strong>Versão Bootstrap</strong>
        <span class="badge">Bootstrap 5</span>
        <span>Layout clássico e responsivo com Bootstrap CSS</span>
      </a>
      <a href="tailwind/" class="card">
        <i class="fa-solid fa-wind"></i>
        <strong>Versão Tailwind</strong>
        <span class="badge">Tailwind CSS</span>
        <span>Design editorial com Tailwind utility-first CSS</span>
      </a>
    </div>
  </div>
</body>
</html>
